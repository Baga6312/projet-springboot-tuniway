<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tuniway - Se connecter</title>
    <link rel="stylesheet" href="/assets/css/style.css">
    <style>
        /* Critical inline styles as fallback */
        body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        .auth-container { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100vw; 
            height: 100vh; 
            background-image: url('/assets/images/logsignback.jpg');
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .auth-card { 
            background: white; 
            border-radius: 20px; 
            padding: 40px; 
            max-width: 450px; 
            width: 100%;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <img src="/assets/images/logo.png" alt="Tuniway Logo" class="auth-logo">
            
            <form class="auth-form" id="loginForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" class="form-input" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Mot de passe</label>
                    <input type="password" id="password" name="password" class="form-input" required>
                    <button type="button" class="password-toggle" id="togglePassword">
                        <span id="toggleText">Afficher</span>
                    </button>
                </div>
                
                <button type="submit" class="submit-button" id="submitButton" disabled>
                    Se connecter
                </button>
            </form>
            
            <p class="auth-subtitle" style="margin-top: 20px;">
                Vous n'avez pas de compte ? <a href="/signup.html">S'inscrire</a>
            </p>
        </div>
    </div>
    
    <script src="/assets/js/main.js"></script>
    <script>
        // Login page specific JavaScript
        const loginForm = document.getElementById('loginForm');
        const passwordInput = document.getElementById('password');
        const togglePassword = document.getElementById('togglePassword');
        const toggleText = document.getElementById('toggleText');
        const submitButton = document.getElementById('submitButton');
        const emailInput = document.getElementById('email');
        
        // Password toggle functionality
        togglePassword.addEventListener('click', function() {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            toggleText.textContent = type === 'password' ? 'Afficher' : 'Masquer';
        });
        
        // Check if all fields are filled
        function checkFormValidity() {
            const email = emailInput.value.trim();
            const password = passwordInput.value;
            
            if (email && password) {
                submitButton.classList.add('active');
                submitButton.disabled = false;
            } else {
                submitButton.classList.remove('active');
                submitButton.disabled = true;
            }
        }
        
        // Event listeners
        emailInput.addEventListener('input', checkFormValidity);
        passwordInput.addEventListener('input', checkFormValidity);
        
        // Form submission
        loginForm.addEventListener('submit', function(e) {
            e.preventDefault();
            if (submitButton.classList.contains('active')) {
                // TODO: Add API call to login endpoint
                console.log('Login form submitted');
                alert('Connexion réussie! (Cette fonctionnalité sera connectée à l\'API)');
            }
        });
    </script>
</body>
</html>
