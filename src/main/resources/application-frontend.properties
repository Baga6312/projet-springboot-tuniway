# Frontend-only profile - Use this to run without database
# Activate with: --spring.profiles.active=frontend

spring.application.name=Tuniway

# Disable database features
spring.data.jpa.repositories.enabled=false
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration,org.springframework.boot.autoconfigure.jdbc.DataSourceTransactionManagerAutoConfiguration

# Server port
server.port=8081

# Component scanning - exclude services and controllers
spring.main.allow-bean-definition-overriding=true
